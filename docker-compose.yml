# Forge CRM - Docker Compose Configuration
# Usage: docker-compose up -d

services:
  forge-crm:
    build:
      context: .
      dockerfile: Dockerfile
    image: forge-crm:1.0
    container_name: forge-crm
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - forge-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.forge.service=forge-crm"
      - "com.forge.environment=production"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  forge-network:
    name: forge-network
    driver: bridge
